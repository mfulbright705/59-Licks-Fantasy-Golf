<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Golf Live</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --line: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --green: #059669;
        --red: #dc2626;
        --blue: #1d4ed8;
        --soft-blue: #eff6ff;
        --soft-red: #fef2f2;
        --soft-gray: #f8fafc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      button, input { font: inherit; }
      .app-shell { min-height: 100vh; padding: 24px; }
      .container { max-width: 1280px; margin: 0 auto; }
      .row { display: flex; gap: 16px; }
      .between { justify-content: space-between; align-items: center; }
      .stack { display: flex; flex-direction: column; gap: 16px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      }
      .card-pad { padding: 20px; }
      .title { font-size: 20px; font-weight: 700; margin: 0; }
      .subtitle { margin: 8px 0 0; color: var(--muted); }
      .header-title { font-size: 28px; font-weight: 800; margin: 0; }
      .badge {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 8px 14px; border-radius: 999px; background: #f1f5f9; color: #0f172a;
        font-size: 12px; font-weight: 600;
      }
      .button {
        border: 0; background: #334155; color: white; padding: 10px 16px; border-radius: 16px;
        cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: 600;
      }
      .button:disabled { opacity: 0.7; cursor: not-allowed; }
      .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
      .stat-inner { display: flex; gap: 14px; align-items: center; }
      .icon-wrap {
        width: 48px; height: 48px; border-radius: 18px; display: grid; place-items: center; background: #f1f5f9;
      }
      .tabs { display: inline-grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: white; padding: 4px; border: 1px solid var(--line); border-radius: 18px; width: min(720px, 100%); }
      .tab-btn {
        border: 0; background: transparent; padding: 10px 16px; border-radius: 14px; cursor: pointer; font-weight: 600; color: #334155;
      }
      .tab-btn.active { background: #f8fafc; color: #0f172a; box-shadow: inset 0 0 0 1px var(--line); }
      .main-grid { display: grid; gap: 24px; }
      .team-grid { display: grid; gap: 24px; grid-template-columns: 320px 1fr; }
      .fa-grid { display: grid; gap: 24px; grid-template-columns: 1fr 360px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 14px 16px; border-bottom: 1px solid var(--line); text-align: left; }
      th { color: var(--muted); font-size: 14px; font-weight: 600; }
      td.num, th.num { text-align: right; }
      td.center, th.center { text-align: center; }
      .muted { color: var(--muted); }
      .green { color: var(--green); font-weight: 700; }
      .red { color: var(--red); font-weight: 700; }
      .gray { color: #94a3b8; font-weight: 700; }
      .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
      .pill-yes { background: #dcfce7; color: #166534; }
      .pill-no { background: #f1f5f9; color: #475569; }
      .alert { border: 1px solid #fecaca; background: var(--soft-red); color: #b91c1c; border-radius: 20px; padding: 16px 18px; }
      .search { width: min(420px, 100%); padding: 12px 14px; border: 1px solid var(--line); border-radius: 14px; background: white; }
      .team-list { display: flex; flex-direction: column; gap: 10px; }
      .team-select {
        width: 100%; text-align: left; border: 1px solid var(--line); background: white; color: #0f172a;
        border-radius: 14px; padding: 12px 16px; cursor: pointer; font-weight: 600;
      }
      .team-select.active { background: #334155; color: white; }
      .small-note { color: var(--muted); font-size: 12px; line-height: 1.5; }
      .move-card { border: 1px solid var(--line); border-radius: 18px; padding: 16px; background: var(--soft-gray); }
      .section-title { font-size: 18px; font-weight: 700; margin: 0 0 16px; }
      @media (max-width: 980px) {
        .stats { grid-template-columns: repeat(2, 1fr); }
        .team-grid, .fa-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .app-shell { padding: 16px; }
        .stats { grid-template-columns: 1fr; }
        .tabs { grid-template-columns: 1fr 1fr; }
        .row.between { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const DATA_URL = "https://script.google.com/macros/s/AKfycbxlf3nqcU8R-eeMjFcAZVlJm_3-OcVJ2YcIPPhZ1w2FYyoXzHSEpOrGUcEbtrqIYba_rQ/exec";
        const TEAM_ROUND_PAR = 350;
        const KNOWN_US_OPEN_TOTALS = {
          Orians: { R1: 356, R2: 335, R3: 359 },
          Dexter: { R1: 351, R2: 341, R3: 359 },
          Justin: { R1: 345, R2: 351, R3: 356 },
          Andrew: { R1: 349, R2: 347, R3: 363 },
          Ryan: { R1: 350, R2: 350, R3: 360 },
          Michael: { R1: 346, R2: 356, R3: 362 },
          Booher: { R1: 360, R2: 339, R3: 366 },
          Ty: { R1: 357, R2: 354, R3: 373 },
        };
        const isPreRound = (value) => String(value ?? "").trim().toLowerCase() === "pre-round";
        const blank = (value) => value === null || value === undefined || value === "";
        const preRoundTeams = new Set();
        const penaltyAdjustments = new Map();

        const teamName = (row, fallback = "") => String(row?.team ?? row?.Team ?? fallback ?? "").trim();
        const shouldClearScore = (row) => isPreRound(row?.thru ?? row?.Thru);
        const scoreValue = (row) => {
          const score = Number(row?.currentRoundScore ?? row?.CurrentRoundScore ?? row?.roundScore ?? row?.RoundScore ?? row?.today ?? row?.Today);
          return Number.isFinite(score) ? score : 0;
        };
        const isCounting = (row) => {
          const value = row?.counting ?? row?.Counting ?? row?.counts ?? row?.Counts;
          return value === true || String(value ?? "").trim().toLowerCase() === "yes" || String(value ?? "").trim().toLowerCase() === "true";
        };
        const isPenaltyRow = (row) => {
          const source = String(row?.source ?? row?.Source ?? "").trim().toLowerCase();
          const golfer = String(row?.golfer ?? row?.Golfer ?? "").trim().toLowerCase();
          return source === "computed" || golfer.includes("worst score penalty");
        };
        const isCutStatus = (value) => {
          const status = String(value ?? "").trim().toLowerCase();
          return status === "cut" || status === "mc" || status === "wd" || status === "dq" || status === "withdrawn";
        };
        const addPenaltyAdjustment = (team, score) => {
          if (!team || !Number.isFinite(score) || score === 0) return;
          penaltyAdjustments.set(team, (penaltyAdjustments.get(team) ?? 0) + score);
        };

        const cleanStanding = (row) => {
          if (!row || typeof row !== "object" || !shouldClearScore(row)) return row;
          const team = teamName(row);
          if (team) preRoundTeams.add(team);
          const clearedScore = Number(row.today ?? row.Today ?? row.dailyScore ?? row.DailyScore);
          const copy = { ...row };
          if (Number.isFinite(clearedScore)) {
            if ("total" in copy && !blank(copy.total)) copy.total = Number(copy.total) - clearedScore;
            if ("Total" in copy && !blank(copy.Total)) copy.Total = Number(copy.Total) - clearedScore;
          }
          if ("today" in copy) copy.today = null;
          if ("Today" in copy) copy.Today = null;
          if ("dailyScore" in copy) copy.dailyScore = null;
          if ("DailyScore" in copy) copy.DailyScore = "";
          if ("gap" in copy) copy.gap = null;
          if ("Gap" in copy) copy.Gap = "";
          return copy;
        };

        const cleanStandings = (rows) => Array.isArray(rows) ? rows.map(cleanStanding) : rows;

        const cleanTeamDetail = (row) => {
          if (!row || typeof row !== "object") return row;
          const score = row.currentRoundScore ?? row.CurrentRoundScore ?? row.roundScore ?? row.RoundScore;
          if (isPenaltyRow(row) && preRoundTeams.has(teamName(row))) return null;
          const shouldClearPenalty = isPenaltyRow(row) && blank(score);
          if (!shouldClearPenalty) return row;
          const copy = { ...row };
          if ("counting" in copy) copy.counting = false;
          if ("Counting" in copy) copy.Counting = "No";
          if ("counts" in copy) copy.counts = false;
          if ("Counts" in copy) copy.Counts = "No";
          if ("today" in copy) copy.today = null;
          if ("Today" in copy) copy.Today = null;
          if ("currentRoundScore" in copy) copy.currentRoundScore = null;
          if ("CurrentRoundScore" in copy) copy.CurrentRoundScore = "";
          return copy;
        };

        const cleanTeamDetails = (rows) => {
          if (!Array.isArray(rows)) return rows;
          const grouped = new Map();
          rows.forEach((row, index) => {
            const team = teamName(row);
            if (!team) return;
            if (!grouped.has(team)) grouped.set(team, []);
            grouped.get(team).push({ row, index });
          });

          const keepPenaltyIndexes = new Set();
          grouped.forEach((items, team) => {
            const eligibleCount = items.filter(({ row }) => !isPenaltyRow(row) && !isCutStatus(row?.thru ?? row?.Thru)).length;
            const expectedPenaltyCount = preRoundTeams.has(team) ? 0 : Math.max(0, 5 - eligibleCount);
            const penaltyItems = items.filter(({ row }) => isPenaltyRow(row));

            penaltyItems.forEach((item, penaltyIndex) => {
              if (penaltyIndex < expectedPenaltyCount) {
                keepPenaltyIndexes.add(item.index);
                return;
              }

              if (!preRoundTeams.has(team) && isCounting(item.row)) {
                addPenaltyAdjustment(team, scoreValue(item.row));
              }
            });
          });

          return rows.map((row, index) => {
            if (isPenaltyRow(row) && !keepPenaltyIndexes.has(index)) return null;
            return cleanTeamDetail(row);
          }).filter(Boolean);
        };

        const adjustStandingForPenalties = (row) => {
          if (!row || typeof row !== "object") return row;
          const team = teamName(row);
          const adjustment = penaltyAdjustments.get(team) ?? 0;
          if (!adjustment || preRoundTeams.has(team)) return row;
          const copy = { ...row };
          if ("today" in copy && !blank(copy.today)) copy.today = Number(copy.today) - adjustment;
          if ("Today" in copy && !blank(copy.Today)) copy.Today = Number(copy.Today) - adjustment;
          if ("total" in copy && !blank(copy.total)) copy.total = Number(copy.total) - adjustment;
          if ("Total" in copy && !blank(copy.Total)) copy.Total = Number(copy.Total) - adjustment;
          if ("gap" in copy && !blank(copy.gap)) copy.gap = Number(copy.gap) - adjustment;
          if ("Gap" in copy && !blank(copy.Gap)) copy.Gap = Number(copy.Gap) - adjustment;
          return copy;
        };

        const adjustStandingsForPenalties = (rows) => Array.isArray(rows) ? rows.map(adjustStandingForPenalties) : rows;

        const cleanRoundTotals = (value, fallbackTeam = "") => {
          if (Array.isArray(value)) {
            return value.filter((row) => {
              if (!row || typeof row !== "object") return true;
              const team = teamName(row, fallbackTeam);
              const source = String(row.source ?? row.Source ?? "").trim().toLowerCase();
              const isLive = source === "live" || source === "current" || source === "current-round";
              return !(preRoundTeams.has(team) && isLive);
            });
          }

          if (value && typeof value === "object") {
            return Object.fromEntries(Object.entries(value).map(([team, rows]) => [team, cleanRoundTotals(rows, team)]));
          }

          return value;
        };

        const applyKnownRoundTotals = (data) => {
          const event = String(data.currentEvent ?? "").toLowerCase();
          if (!event.includes("u.s. open") && !event.includes("us open")) return;

          data.teamRoundTotals = Object.fromEntries(
            Object.entries(KNOWN_US_OPEN_TOTALS).map(([team, rounds]) => [
              team,
              Object.entries(rounds).map(([round, total]) => ({
                team,
                round,
                total,
                toPar: total - TEAM_ROUND_PAR,
                source: "sheet",
              })),
            ]),
          );
        };

        const originalFetch = window.fetch.bind(window);
        window.fetch = async (...args) => {
          const response = await originalFetch(...args);
          const requestUrl = String(args[0]?.url ?? args[0] ?? "");
          if (!requestUrl.includes(DATA_URL)) return response;

          try {
            const data = await response.clone().json();
            preRoundTeams.clear();
            penaltyAdjustments.clear();
            data.dailyStandings = cleanStandings(data.dailyStandings);
            data.tournamentStandings = cleanStandings(data.tournamentStandings);
            data.teamDetails = cleanTeamDetails(data.teamDetails);
            data.dailyStandings = adjustStandingsForPenalties(data.dailyStandings);
            data.tournamentStandings = adjustStandingsForPenalties(data.tournamentStandings);
            applyKnownRoundTotals(data);
            data.teamRoundTotals = cleanRoundTotals(data.teamRoundTotals);

            const headers = new Headers(response.headers);
            headers.set("content-type", "application/json");
            return new Response(JSON.stringify(data), {
              status: response.status,
              statusText: response.statusText,
              headers,
            });
          } catch (error) {
            return response;
          }
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
