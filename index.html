      (() => {

        const TEAM_ROUND_PAR = 350;

        const KNOWN_US_OPEN_PLAYER_TOTALS = {

          },
          Orians: {

          },
          Dexter: {

          },
        };
        const KNOWN_US_OPEN_CURRENT_ROUND_OVERRIDES = [
          {
            team: "Booher",
            names: ["Niemann, Joaquin", "Joaquin Niemann"],
            today: -4,
            currentRoundScore: -4,
            thru: "F",
          },
          {
            team: "Ty",
            names: ["Koivun, Jackson", "Jackson Koivun", "Jackson Koivun (a)"],
            today: -2,
            currentRoundScore: -2,
            thru: "F",
          },
        ];

        const blank = (value) => value === null || value === undefined || value === "";
        const isPreRound = (value) => String(value ?? "").trim().toLowerCase() === "pre-round";
        const teamName = (row, fallback = "") => String(row?.team ?? row?.Team ?? fallback ?? "").trim();
        const scoreValue = (row) => {
          const score = Number(row?.currentRoundScore ?? row?.CurrentRoundScore ?? row?.roundScore ?? row?.RoundScore ?? row?.today ?? row?.Today);
          return Number.isFinite(score) ? score : 0;
        };
        const currentRoundScoreRaw = (row) => row?.currentRoundScore ?? row?.CurrentRoundScore ?? row?.roundScore ?? row?.RoundScore ?? row?.today ?? row?.Today ?? row?.dailyScore ?? row?.DailyScore;
        const currentRoundScoreValue = (row) => {
          const score = Number(currentRoundScoreRaw(row));
          return Number.isFinite(score) ? score : 0;
        };
        const setScoreValue = (row, score) => {
          row.currentRoundScore = score;
          if ("currentRoundScore" in row) row.currentRoundScore = score;
          if ("CurrentRoundScore" in row) row.CurrentRoundScore = score;
          if ("roundScore" in row) row.roundScore = score;
          if ("RoundScore" in row) row.RoundScore = score;
        };
        const setTodayValue = (row, score) => {
          row.today = score;
          if ("Today" in row) row.Today = score;
          if ("dailyScore" in row) row.dailyScore = score;
          if ("DailyScore" in row) row.DailyScore = score;
        };
        const setThruValue = (row, thru) => {
          row.thru = thru;
          if ("Thru" in row) row.Thru = thru;
        };
        const setSourceValue = (row, source) => {
          row.source = source;
          if ("Source" in row) row.Source = source;
        };
        const setCountingValue = (row, counting) => {
          row.counting = counting;
          if ("Counting" in row) row.Counting = counting ? "Yes" : "No";
          if ("counts" in row) row.counts = counting;
          if ("Counts" in row) row.Counts = counting ? "Yes" : "No";
        };
        const isCounting = (row) => {
          const value = row?.counting ?? row?.Counting ?? row?.counts ?? row?.Counts;
          const label = String(value ?? "").trim().toLowerCase();
          return value === true || label === "yes" || label === "true";
        };
        const isPenaltyRow = (row) => {
          const source = String(row?.source ?? row?.Source ?? "").trim().toLowerCase();
          const golfer = String(row?.golfer ?? row?.Golfer ?? "").trim().toLowerCase();
          return source === "computed" || golfer.includes("worst score penalty");
        };
        const isCutStatus = (value) => {
          const status = String(value ?? "").trim().toLowerCase();
          return status === "cut" || status === "mc" || status === "wd" || status === "dq" || status === "withdrawn";
        };
        const isKnownUsOpen = (data) => {
          const event = String(data.currentEvent ?? "").toLowerCase();
          return event.includes("u.s. open") || event.includes("us open");
        };
        const normalizeName = (value) => String(value ?? "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\([^)]*\)/g, "")
          .replace(/[^\p{L}\p{N}]/gu, "")
          .toLowerCase();
        const getKnownCurrentRoundOverride = (team, golfer) => {
          const normalizedGolfer = normalizeName(golfer);
          return KNOWN_US_OPEN_CURRENT_ROUND_OVERRIDES.find((override) => {
            if (team && override.team && team !== override.team) return false;
            return override.names.some((name) => normalizeName(name) === normalizedGolfer);
          }) ?? null;
        };

        const preRoundTeams = new Set();
        const penaltyAdjustments = new Map();
        const addPenaltyAdjustment = (team, score) => {
          if (!team || !Number.isFinite(score) || score === 0) return;
          penaltyAdjustments.set(team, (penaltyAdjustments.get(team) ?? 0) + score);
        };
        const normalizeKeptPenalty = (team, row) => {
          const currentScore = scoreValue(row);
          if (currentScore >= POST_CUT_PENALTY_TO_PAR) return;
          addPenaltyAdjustment(team, currentScore - POST_CUT_PENALTY_TO_PAR);
          setScoreValue(row, POST_CUT_PENALTY_TO_PAR);
        };

        const cleanStanding = (row) => {
          if (!row || typeof row !== "object" || !isPreRound(row?.thru ?? row?.Thru)) return row;
          const team = teamName(row);
          if (team) preRoundTeams.add(team);
          const clearedScore = Number(row.today ?? row.Today ?? row.dailyScore ?? row.DailyScore);
          const copy = { ...row };
          if (Number.isFinite(clearedScore)) {
            if ("total" in copy && !blank(copy.total)) copy.total = Number(copy.total) - clearedScore;
            if ("Total" in copy && !blank(copy.Total)) copy.Total = Number(copy.Total) - clearedScore;
          }
          if ("today" in copy) copy.today = null;
          if ("Today" in copy) copy.Today = null;
          if ("dailyScore" in copy) copy.dailyScore = null;
          if ("DailyScore" in copy) copy.DailyScore = "";
          if ("gap" in copy) copy.gap = null;
          if ("Gap" in copy) copy.Gap = "";
          return copy;
        };
        const cleanStandings = (rows) => Array.isArray(rows) ? rows.map(cleanStanding) : rows;

        const hasCurrentRoundScore = (row) => {
          if (!row || typeof row !== "object" || isPenaltyRow(row)) return false;
          return !blank(currentRoundScoreRaw(row)) && !isPreRound(row?.thru ?? row?.Thru);
        };
        const releasePreRoundTeamsWithCurrentScores = (rows) => {
          if (!Array.isArray(rows)) return;
          rows.forEach((row) => {
            if (!hasCurrentRoundScore(row)) return;
            const team = teamName(row);
            if (team) preRoundTeams.delete(team);
          });
        };

        const cleanTeamDetails = (rows) => {
          if (!Array.isArray(rows)) return rows;
          const grouped = new Map();
          rows.forEach((row, index) => {
            const team = teamName(row);
            if (!team) return;
            if (!grouped.has(team)) grouped.set(team, []);
            grouped.get(team).push({ row, index });
          });

          const keepPenaltyIndexes = new Set();
          grouped.forEach((items, team) => {
            const eligibleCount = items.filter(({ row }) => !isPenaltyRow(row) && !isCutStatus(row?.thru ?? row?.Thru)).length;
            const expectedPenaltyCount = preRoundTeams.has(team) ? 0 : Math.max(0, 5 - eligibleCount);
            const penaltyItems = items.filter(({ row }) => isPenaltyRow(row));
            penaltyItems.forEach((item, penaltyIndex) => {
              if (penaltyIndex < expectedPenaltyCount) {
                normalizeKeptPenalty(team, item.row);
                keepPenaltyIndexes.add(item.index);
              } else if (!preRoundTeams.has(team) && isCounting(item.row)) {
                addPenaltyAdjustment(team, scoreValue(item.row));
              }
            });
          });

          return rows.map((row, index) => {
            if (!row || typeof row !== "object") return row;
            if (isPenaltyRow(row) && !keepPenaltyIndexes.has(index)) return null;
            if (isPenaltyRow(row) && preRoundTeams.has(teamName(row))) return null;
            const score = row.currentRoundScore ?? row.CurrentRoundScore ?? row.roundScore ?? row.RoundScore;
            if (!isPenaltyRow(row) || !blank(score)) return row;
            const copy = { ...row };
            if ("counting" in copy) copy.counting = false;
            if ("Counting" in copy) copy.Counting = "No";
            if ("counts" in copy) copy.counts = false;
            if ("Counts" in copy) copy.Counts = "No";
            if ("today" in copy) copy.today = null;
            if ("Today" in copy) copy.Today = null;
            if ("currentRoundScore" in copy) copy.currentRoundScore = null;
            if ("CurrentRoundScore" in copy) copy.CurrentRoundScore = "";
            return copy;
          }).filter(Boolean);
        };

        const applyKnownCurrentRoundOverrides = (data) => {
          if (
            !isKnownUsOpen(data) ||
            String(data.currentRound ?? "").trim().toUpperCase() !== "R4" ||
            !Array.isArray(data.teamDetails)
          ) return;

          data.teamDetails = data.teamDetails.map((row) => {
            if (!row || typeof row !== "object" || isPenaltyRow(row)) return row;
            const override = getKnownCurrentRoundOverride(teamName(row), row?.golfer ?? row?.Golfer);
            if (!override) return row;
            const copy = { ...row };
            setTodayValue(copy, override.today);
            setScoreValue(copy, override.currentRoundScore);
            setThruValue(copy, override.thru);
            setSourceValue(copy, "live");
            return copy;
          });

          if (Array.isArray(data.topGolfers)) {
            data.topGolfers = data.topGolfers.map((row) => {
              const override = getKnownCurrentRoundOverride("", row?.player ?? row?.Player);
              if (!override) return row;
              return { ...row, today: override.today, thru: override.thru, owner: override.team };
            });
          }

          if (Array.isArray(data.freeAgents)) {
            data.freeAgents = data.freeAgents.filter((row) => !getKnownCurrentRoundOverride("", row?.name ?? row?.Name));
            data.freeAgentCount = data.freeAgents.length;
          }
        };

        const recountTeamDetails = (rows) => {
          if (!Array.isArray(rows)) return rows;
          const grouped = new Map();
          rows.forEach((row, index) => {
            const team = teamName(row);
            if (!team) return;
            if (!grouped.has(team)) grouped.set(team, []);
            grouped.get(team).push({ row, index });
          });

          const countedIndexes = new Set();
          const scoreByIndex = new Map();
          grouped.forEach((items, team) => {
            if (preRoundTeams.has(team)) return;
            const candidates = items
              .filter(({ row }) => isPenaltyRow(row) || (!isCutStatus(row?.thru ?? row?.Thru) && !blank(currentRoundScoreRaw(row))))
              .map(({ row, index }) => {
                const score = isPenaltyRow(row) ? scoreValue(row) : currentRoundScoreValue(row);
                return { index, score: Number.isFinite(score) ? score : 0 };
              })
              .sort((a, b) => a.score - b.score || a.index - b.index);
            candidates.slice(0, 5).forEach(({ index, score }) => {
              countedIndexes.add(index);
              scoreByIndex.set(index, score);
            });
          });

          return rows.map((row, index) => {
            if (!row || typeof row !== "object") return row;
            const copy = { ...row };
            const counting = countedIndexes.has(index);
            setCountingValue(copy, counting);
            if (counting && scoreByIndex.has(index)) {
              const score = scoreByIndex.get(index);
              if (blank(copy.currentRoundScore ?? copy.CurrentRoundScore ?? copy.roundScore ?? copy.RoundScore)) {
                setScoreValue(copy, score);
              }
              if (blank(copy.today ?? copy.Today ?? copy.dailyScore ?? copy.DailyScore)) {
                setTodayValue(copy, score);
              }
            }
            return copy;
          });
        };

        const applyKnownDailyScores = (data) => {
          if (!isKnownUsOpen(data) || !Array.isArray(data.teamDetails)) return;
          const scores = new Map();
          data.teamDetails.forEach((row) => {
            if (!isCounting(row)) return;
            const team = teamName(row);
            if (!team) return;
            scores.set(team, (scores.get(team) ?? 0) + currentRoundScoreValue(row));
          });

          const updateRows = (rows, shouldSort) => {
            if (!Array.isArray(rows)) return rows;
            let updated = rows.map((row) => {
              const team = teamName(row);
              if (!scores.has(team)) return row;
              const copy = { ...row };
              setTodayValue(copy, scores.get(team));
              return copy;
            });
            if (shouldSort) {
              updated = updated.sort((a, b) => Number(a.today ?? a.Today ?? 999999) - Number(b.today ?? b.Today ?? 999999));
              const leaderScore = Number(updated[0]?.today ?? updated[0]?.Today ?? 0);
              updated = updated.map((row, index) => {
                const score = Number(row.today ?? row.Today);
                const copy = { ...row };
                if ("rank" in copy) copy.rank = index + 1;
                if ("Rank" in copy) copy.Rank = index + 1;
                if (Number.isFinite(score)) {
                  if ("gap" in copy) copy.gap = score - leaderScore;
                  if ("Gap" in copy) copy.Gap = score - leaderScore;
                }
                return copy;
              });
            }
            return updated;
          };

          data.dailyStandings = updateRows(data.dailyStandings, true);
          data.tournamentStandings = updateRows(data.tournamentStandings, false);
        };

        const adjustStandingForPenalties = (row) => {
          if (!row || typeof row !== "object") return row;
          const team = teamName(row);
          const adjustment = penaltyAdjustments.get(team) ?? 0;
          if (!adjustment || preRoundTeams.has(team)) return row;
          const copy = { ...row };
          if ("today" in copy && !blank(copy.today)) copy.today = Number(copy.today) - adjustment;
          if ("Today" in copy && !blank(copy.Today)) copy.Today = Number(copy.Today) - adjustment;
          if ("total" in copy && !blank(copy.total)) copy.total = Number(copy.total) - adjustment;
          if ("Total" in copy && !blank(copy.Total)) copy.Total = Number(copy.Total) - adjustment;
          if ("gap" in copy && !blank(copy.gap)) copy.gap = Number(copy.gap) - adjustment;
          if ("Gap" in copy && !blank(copy.Gap)) copy.Gap = Number(copy.Gap) - adjustment;
          return copy;
        };
        const adjustStandingsForPenalties = (rows) => Array.isArray(rows) ? rows.map(adjustStandingForPenalties) : rows;

        const cleanRoundTotals = (value, fallbackTeam = "") => {
          if (Array.isArray(value)) {
            return value.filter((row) => {
              if (!row || typeof row !== "object") return true;
              const team = teamName(row, fallbackTeam);
              const source = String(row.source ?? row.Source ?? "").trim().toLowerCase();
              const isLive = source === "live" || source === "current" || source === "current-round";
              return !(preRoundTeams.has(team) && isLive);
            });
          }
          if (value && typeof value === "object") {
            return Object.fromEntries(Object.entries(value).map(([team, rows]) => [team, cleanRoundTotals(rows, team)]));
          }
          return value;
        };

        const applyKnownRoundTotals = (data) => {
          if (!isKnownUsOpen(data)) return;
          data.teamRoundTotals = Object.fromEntries(
            Object.entries(KNOWN_US_OPEN_TOTALS).map(([team, rounds]) => [
              team,
              Object.entries(rounds).map(([round, total]) => ({
                team,
                round,
                total,
                toPar: total - TEAM_ROUND_PAR,
                source: "sheet",
              })),
            ]),
          );
        };

        const getPlayerBaseTotals = (team) => {
          const rows = KNOWN_US_OPEN_PLAYER_TOTALS[team] ?? {};
          return Object.fromEntries(Object.entries(rows).map(([golfer, score]) => [normalizeName(golfer), Number(score)]));
        };
        const calculateKnownTournamentTotal = (data, team) => {
          const baseTotals = getPlayerBaseTotals(team);
          const values = (Array.isArray(data.teamDetails) ? data.teamDetails : [])
            .filter((row) => teamName(row) === team && !isPenaltyRow(row))
            .map((row) => {
              const base = baseTotals[normalizeName(row?.golfer ?? row?.Golfer)];
              if (!Number.isFinite(base)) return null;
              const currentScore = isCutStatus(row?.thru ?? row?.Thru) ? POST_CUT_PENALTY_TO_PAR : currentRoundScoreValue(row);
              return base + currentScore;
            })
            .filter((value) => Number.isFinite(value))
            .sort((a, b) => a - b);
          if (values.length < 5) return null;
          const toPar = values.slice(0, 5).reduce((sum, value) => sum + value, 0);
          const completedRoundCount = Object.keys(KNOWN_US_OPEN_TOTALS[team] ?? {}).length || 0;
          return { total: completedRoundCount * TEAM_ROUND_PAR + toPar, toPar };
        };

        const applyKnownTournamentStandings = (data) => {
          if (!isKnownUsOpen(data) || !Array.isArray(data.tournamentStandings)) return;
          data.tournamentStandings = data.tournamentStandings
            .map((row) => {
              const calculated = calculateKnownTournamentTotal(data, teamName(row));
              if (!calculated) return row;
              const copy = { ...row };
              if ("total" in copy) copy.total = calculated.total;
              if ("Total" in copy) copy.Total = calculated.total;
              copy.toPar = calculated.toPar;
              copy.totalToPar = calculated.toPar;
              return copy;
            })
            .sort((a, b) => Number(a.total ?? a.Total ?? 999999) - Number(b.total ?? b.Total ?? 999999));
          const leaderTotal = Number(data.tournamentStandings[0]?.total ?? data.tournamentStandings[0]?.Total ?? 0);
          data.tournamentStandings = data.tournamentStandings.map((row, index) => {
            const total = Number(row.total ?? row.Total);
            const copy = { ...row };
            if ("rank" in copy) copy.rank = index + 1;
            if ("Rank" in copy) copy.Rank = index + 1;
            if (Number.isFinite(total)) {
              if ("gap" in copy) copy.gap = total - leaderTotal;
              if ("Gap" in copy) copy.Gap = total - leaderTotal;
            }
            return copy;
          });
          const leaderTeam = teamName(data.tournamentStandings[0]);
          if (leaderTeam) data.leader = leaderTeam;
        };

        // The source sheet can populate provisional R1 totals before R1 is over.
        // Do not treat those values as a completed round and add the same live scores again.
        const restoreLiveFirstRoundTournamentStandings = (data) => {
          const reportedRound = String(data.currentRound ?? "").trim().toUpperCase();
          const completedRounds = data.currentEventResults?.daily;
          const hasLiveTeams = Array.isArray(data.dailyStandings) && data.dailyStandings.some((row) =>
            /\blive\b/i.test(String(row?.thru ?? row?.Thru ?? "")),
          );
          const prematureAdvance =
            reportedRound === "R2" &&
            Array.isArray(completedRounds) &&
            completedRounds.length === 1 &&
            String(completedRounds[0]?.round ?? "").trim().toUpperCase() === "R1" &&
            hasLiveTeams;
          if (!prematureAdvance) return;

          const standings = data.dailyStandings
            .map((row) => {
              const today = Number(row?.today ?? row?.Today);
              const copy = { ...row };
              if (Number.isFinite(today)) {
                copy.total = TEAM_ROUND_PAR + today;
                copy.toPar = today;
                copy.totalToPar = today;
              }
              return copy;
            })
            .sort((a, b) => Number(a.today ?? a.Today ?? 999999) - Number(b.today ?? b.Today ?? 999999));
          const leaderScore = Number(standings[0]?.today ?? standings[0]?.Today ?? 0);
          data.tournamentStandings = standings.map((row, index) => ({
            ...row,
            rank: index + 1,
            gap: Number(row.today ?? row.Today ?? 0) - leaderScore,
          }));
          data.currentRound = "R1";
          data.currentEventResults = { daily: [], tournament: null };
          data.teamRoundTotals = {};
          data.leader = teamName(data.tournamentStandings[0]);
        };


        // While Round 2 is live, the source currently pre-populates its completed column
        // and reports R3. Rebuild totals from verified R1 scores plus live R2 scoring.
        const restoreLiveSecondRoundTournamentStandings = (data) => {
          const reportedRound = Number(String(data.currentRound ?? "").match(/\d+/)?.[0] ?? 0);
          const event = String(data.currentEvent ?? "").toLowerCase();
          const hasLiveTeams = Array.isArray(data.dailyStandings) && data.dailyStandings.some((row) =>
            /\blive\b/i.test(String(row?.thru ?? row?.Thru ?? "")),
          );
          if (
            !event.includes("open championship") ||
            reportedRound !== 3 ||
            !hasLiveTeams ||
            !Array.isArray(data.currentEventResults?.daily) ||
            data.currentEventResults.daily.length !== 2
          ) return;

          const standings = data.dailyStandings
            .map((row) => {
              const team = teamName(row);
              const today = Number(row?.today ?? row?.Today);
              const completed = OPEN_CHAMPIONSHIP_R1_TOTALS[team];
              const copy = { ...row };
              if (Number.isFinite(today) && Number.isFinite(completed)) {
                copy.total = completed + TEAM_ROUND_PAR + today;
                copy.toPar = copy.total - TEAM_ROUND_PAR * 2;
                copy.totalToPar = copy.toPar;
              }
              return copy;
            })
            .sort((a, b) => Number(a.total ?? a.Total ?? 999999) - Number(b.total ?? b.Total ?? 999999));
          const leaderTotal = Number(standings[0]?.total ?? standings[0]?.Total ?? 0);
          data.tournamentStandings = standings.map((row, index) => ({
            ...row,
            rank: index + 1,
            gap: Number(row.total ?? row.Total ?? 0) - leaderTotal,
          }));
          data.currentRound = "R2";
          data.currentEventResults = {
            daily: data.currentEventResults.daily.filter((row) =>
              String(row?.round ?? "").trim().toUpperCase() === "R1",
            ),
            tournament: data.tournamentStandings[0]
              ? { winner: teamName(data.tournamentStandings[0]), score: leaderTotal }
              : null,
          };
          data.teamRoundTotals = Object.fromEntries(
            data.tournamentStandings.map((row) => {
              const team = teamName(row);
              const today = Number(row?.today ?? row?.Today);
              const completed = OPEN_CHAMPIONSHIP_R1_TOTALS[team];
              return [team, [
                { team, round: "R1", total: completed, toPar: completed - TEAM_ROUND_PAR, source: "sheet" },
                { team, round: "R2", total: TEAM_ROUND_PAR + today, toPar: today, source: "live" },
              ]];
            }),
          );
          data.leader = teamName(data.tournamentStandings[0]);
        };


        const applyVerifiedOpenChampionshipR2Standings = (data) => {
          const event = String(data.currentEvent ?? "").toLowerCase();
          const hasR2Result = Array.isArray(data.currentEventResults?.daily) &&
            data.currentEventResults.daily.some((row) =>
              String(row?.round ?? "").trim().toUpperCase() === "R2",
            );
          if (!event.includes("open championship") || !hasR2Result) return;

          const rows = Object.entries(OPEN_CHAMPIONSHIP_VERIFIED_R2)
            .map(([team, scores]) => ({
              team,
              total: TEAM_ROUND_PAR * 2 + scores.total,
              today: scores.r2,
              thru: "Final",
              toPar: scores.total,
              totalToPar: scores.total,
              trend: "flat",
            }))
            .sort((a, b) => a.total - b.total);
          const leaderTotal = rows[0]?.total ?? 0;
          data.dailyStandings = [...rows]
            .sort((a, b) => a.today - b.today)
            .map((row, index) => ({ ...row, rank: index + 1, gap: row.today - (rows.reduce((best, item) => Math.min(best, item.today), Infinity)) }));
          data.tournamentStandings = rows.map((row, index) => ({
            ...row,
            rank: index + 1,
            gap: row.total - leaderTotal,
          }));
          data.teamRoundTotals = Object.fromEntries(Object.entries(OPEN_CHAMPIONSHIP_VERIFIED_R2).map(([team, scores]) => [
            team,
            [
              { team, round: "R1", total: TEAM_ROUND_PAR + scores.r1, toPar: scores.r1, source: "sheet" },
              { team, round: "R2", total: TEAM_ROUND_PAR + scores.r2, toPar: scores.r2, source: "sheet" },
            ],
          ]));
          data.currentRound = "R2";
          data.currentEventResults = {
            daily: [
              { round: "R1", winner: "Justin, Dexter", score: TEAM_ROUND_PAR - 9 },
              { round: "R2", winner: "Dexter", score: TEAM_ROUND_PAR - 16 },
            ],
            tournament: { winner: "Ty", score: TEAM_ROUND_PAR * 2 - 18 },
          };
          data.leader = "Ty";
        };

        const originalFetch = window.fetch.bind(window);
        window.fetch = async (...args) => {
          const response = await originalFetch(...args);
          const requestUrl = String(args[0]?.url ?? args[0] ?? "");
          if (!requestUrl.includes(DATA_URL)) return response;
          try {
            const data = await response.clone().json();
            preRoundTeams.clear();
            penaltyAdjustments.clear();
            data.dailyStandings = cleanStandings(data.dailyStandings);
            data.tournamentStandings = cleanStandings(data.tournamentStandings);
            if (
              Array.isArray(data.dailyStandings) &&
              data.dailyStandings.length > 0 &&
              data.dailyStandings.every((row) => isPreRound(row?.thru ?? row?.Thru))
            ) {
              data.liveStatus = "Pre-round";
              data.leader = "";
            }
            applyKnownCurrentRoundOverrides(data);
            releasePreRoundTeamsWithCurrentScores(data.teamDetails);
            data.teamDetails = cleanTeamDetails(data.teamDetails);
            data.teamDetails = recountTeamDetails(data.teamDetails);
            data.dailyStandings = adjustStandingsForPenalties(data.dailyStandings);
            data.tournamentStandings = adjustStandingsForPenalties(data.tournamentStandings);
            applyKnownRoundTotals(data);
            applyKnownDailyScores(data);
            applyKnownTournamentStandings(data);
            restoreLiveFirstRoundTournamentStandings(data);
            restoreLiveSecondRoundTournamentStandings(data);
            applyVerifiedOpenChampionshipR2Standings(data);
            data.teamRoundTotals = cleanRoundTotals(data.teamRoundTotals);
            const headers = new Headers(response.headers);
            headers.set("content-type", "application/json");
            return new Response(JSON.stringify(data), {
              status: response.status,
              statusText: response.statusText,
              headers,
            });
          } catch (error) {
            return response;
          }
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
